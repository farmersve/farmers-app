<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Farmers">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0e1240">
<title>Farmers C.A. · Mobile v20260416</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
:root{
  --navy:#0e1240;--navy2:#1B1F6B;--teal:#0d9488;--amber:#f59e0b;
  --green:#16a34a;--red:#dc2626;--gray:#64748b;--light:#f1f5f9;
  --card:#ffffff;--border:#e2e8f0;--text:#1e293b;--muted:#94a3b8;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--navy);font-family:'Barlow',sans-serif;color:var(--text);overscroll-behavior:none}
body{display:flex;flex-direction:column}

/* ── HEADER ── */
#header{
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  padding:calc(var(--safe-top) + 12px) 16px 12px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.1);flex-shrink:0;
}
#header .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.3rem;color:#fff;letter-spacing:1px}
#header .logo span{color:var(--teal)}
#conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
#conn-dot.ok{background:var(--green)}
#conn-dot.err{background:var(--red)}
#header-right{display:flex;align-items:center;gap:8px}
#sync-btn{background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:6px;padding:5px 10px;font-size:.7rem;font-weight:700;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px}

/* ── NAV TABS ── */
#nav{
  background:var(--navy2);display:flex;border-bottom:2px solid rgba(255,255,255,.1);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
#nav::-webkit-scrollbar{display:none}
.nav-tab{
  flex:1;min-width:72px;padding:10px 4px 8px;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;border-bottom:3px solid transparent;
  transition:border-color .2s;position:relative;
}
.nav-tab.active{border-bottom-color:var(--teal)}
.nav-tab .tab-icon{font-size:1.3rem}
.nav-tab .tab-label{font-size:.58rem;font-weight:700;color:rgba(255,255,255,.6);
  letter-spacing:.5px;text-transform:uppercase;white-space:nowrap;font-family:'Barlow Condensed',sans-serif}
.nav-tab.active .tab-label{color:#fff}

/* ── CONTENT ── */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--light)}
.screen{display:none;padding:12px;min-height:100%}
.screen.active{display:block}

/* ── CARDS ── */
.card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.card-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.85rem;
  color:var(--navy2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;
  display:flex;align-items:center;justify-content:space-between}
.badge{padding:2px 8px;border-radius:20px;font-size:.62rem;font-weight:700;letter-spacing:.5px;
  font-family:'Barlow Condensed',sans-serif;white-space:nowrap}
.badge-green{background:#dcfce7;color:#16a34a}
.badge-amber{background:#fef3c7;color:#d97706}
.badge-red{background:#fee2e2;color:#dc2626}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-gray{background:#f1f5f9;color:#64748b}

/* ── PEDIDO CARD ── */
.pedido-card{background:var(--card);border-radius:12px;margin-bottom:10px;overflow:hidden;
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.pedido-header{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);cursor:pointer}
.pedido-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;color:var(--navy2)}
.pedido-fecha{font-size:.7rem;color:var(--muted)}
.pedido-body{padding:12px 14px;display:none}
.pedido-body.open{display:block}
.suc-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;
  border-bottom:1px solid var(--border)}
.suc-row:last-child{border-bottom:none}
.suc-name{font-size:.82rem;font-weight:600;color:var(--text);flex:1;margin-right:8px}
.suc-actions{display:flex;gap:6px;align-items:center}
.btn-estado{border:none;border-radius:6px;padding:5px 10px;font-size:.68rem;font-weight:700;
  cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:.5px;transition:opacity .15s}
.btn-estado:active{opacity:.7}
.btn-embalar{background:#fef3c7;color:#92400e}
.btn-embalar.active{background:#059669;color:#fff}
.btn-despachar{background:#dbeafe;color:#1e40af}
.btn-despachar.active{background:#16a34a;color:#fff}

/* ── INVENTARIO ── */
.inv-search{background:var(--card);border-radius:10px;padding:10px 14px;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.inv-search input{flex:1;border:none;outline:none;font-size:.88rem;color:var(--text);
  background:transparent;font-family:'Barlow',sans-serif}
.inv-row{background:var(--card);border-radius:10px;padding:10px 14px;margin-bottom:6px;
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 1px 2px rgba(0,0,0,.05)}
.inv-ref{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.9rem;color:var(--navy2);min-width:70px}
.inv-desc{font-size:.75rem;color:var(--gray);flex:1;margin:0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.inv-stock{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1rem;min-width:40px;text-align:right}
.stock-ok{color:var(--green)}
.stock-low{color:var(--amber)}
.stock-out{color:var(--red)}

/* ── CXC ── */
.cxc-row{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cxc-client{font-weight:700;font-size:.88rem;color:var(--text)}
.cxc-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.cxc-saldo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.1rem}
.cxc-saldo.debe{color:var(--red)}
.cxc-saldo.ok{color:var(--green)}

/* ── CATALOGO ── */
.cat-search{background:var(--card);border-radius:10px;padding:10px 14px;
  margin-bottom:10px;display:flex;align-items:center;gap:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cat-search input{flex:1;border:none;outline:none;font-size:.88rem;color:var(--text);background:transparent}
.cat-card{background:var(--card);border-radius:10px;padding:12px 14px;margin-bottom:8px;
  box-shadow:0 1px 3px rgba(0,0,0,.08)}
.cat-ref{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:.85rem;color:var(--navy2)}
.cat-desc{font-size:.82rem;font-weight:600;color:var(--text);margin:2px 0}
.cat-prices{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.cat-price{font-size:.72rem;background:var(--light);border-radius:4px;padding:3px 8px;color:var(--gray)}
.cat-price span{font-weight:700;color:var(--navy2)}

/* ── ESTADOS ── */
.estado-pendiente{background:#f1f5f9;color:#64748b}
.estado-embalado{background:#d1fae5;color:#065f46}
.estado-despachado{background:#dbeafe;color:#1e40af}
.estado-emitido{background:#fef3c7;color:#92400e}

/* ── LOADING ── */
#loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999;gap:16px}
#loading .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:2rem;
  color:#fff;letter-spacing:2px}
#loading .logo span{color:var(--teal)}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,.2);
  border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#load-msg{font-size:.8rem;color:rgba(255,255,255,.5)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty .icon{font-size:2.5rem;margin-bottom:8px}
.empty p{font-size:.82rem}

/* ── TOTALES BAR ── */
.totales-bar{background:var(--navy2);border-radius:10px;padding:12px 14px;
  margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.totales-bar .kpi{text-align:center}
.totales-bar .kpi .val{font-family:'Barlow Condensed',sans-serif;font-weight:900;
  font-size:1.2rem;color:#fff}
.totales-bar .kpi .lbl{font-size:.6rem;color:rgba(255,255,255,.5);
  text-transform:uppercase;letter-spacing:.5px;font-family:'Barlow Condensed',sans-serif}

/* ── TOAST ── */
#toast{position:fixed;bottom:calc(var(--safe-bot) + 80px);left:50%;transform:translateX(-50%) translateY(100px);
  background:#1e293b;color:#fff;padding:10px 20px;border-radius:20px;
  font-size:.8rem;font-weight:600;z-index:9999;transition:transform .3s;white-space:nowrap;
  max-width:90vw;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.success{background:#16a34a}
#toast.error{background:var(--red)}

/* ── FILTER CHIPS ── */
.filter-chips{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:10px;padding-bottom:2px}
.filter-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;font-size:.72rem;font-weight:700;
  border:1.5px solid var(--border);background:var(--card);color:var(--gray);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px;transition:all .15s}
.chip.active{background:var(--navy2);color:#fff;border-color:var(--navy2)}

/* BOTTOM SAFE */
.bottom-pad{height:calc(var(--safe-bot) + 8px)}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">FARMERS<span>.</span></div>
  <div class="spinner"></div>
  <div id="load-msg">Conectando...</div>
</div>

<div id="header">
  <div class="logo">FARMERS<span>.</span></div>
  <div id="header-right">
    <button id="sync-btn" onclick="sincronizar()">↻ SYNC</button>
    <div id="conn-dot"></div>
  </div>
</div>

<div id="nav">
  <div class="nav-tab active" onclick="showScreen('monitor')" id="tab-monitor">
    <div class="tab-icon">📦</div>
    <div class="tab-label">Monitor</div>
  </div>
  <div class="nav-tab" onclick="showScreen('inventario')" id="tab-inventario">
    <div class="tab-icon">📊</div>
    <div class="tab-label">Inventario</div>
  </div>
  <div class="nav-tab" onclick="showScreen('catalogo')" id="tab-catalogo">
    <div class="tab-icon">📋</div>
    <div class="tab-label">Catálogo</div>
  </div>
  <div class="nav-tab" onclick="showScreen('cxc')" id="tab-cxc">
    <div class="tab-icon">💰</div>
    <div class="tab-label">CXC</div>
  </div>
</div>

<div id="content">
  <!-- MONITOR -->
  <div class="screen active" id="screen-monitor">
    <div id="monitor-kpis"></div>
    <div class="filter-chips" id="monitor-filters">
      <div class="chip active" onclick="setMonitorFilter('todos')" id="fchip-todos">TODOS</div>
      <div class="chip" onclick="setMonitorFilter('pendiente')" id="fchip-pendiente">⏳ PEND.</div>
      <div class="chip" onclick="setMonitorFilter('embalado')" id="fchip-embalado">📦 EMBAL.</div>
      <div class="chip" onclick="setMonitorFilter('despachado')" id="fchip-despachado">🚚 DESP.</div>
    </div>
    <div id="monitor-list"></div>
    <div class="bottom-pad"></div>
  </div>

  <!-- INVENTARIO -->
  <div class="screen" id="screen-inventario">
    <div class="inv-search">
      <span style="color:var(--muted)">🔍</span>
      <input type="search" id="inv-search" placeholder="Buscar referencia o descripción..." oninput="renderInventario()">
    </div>
    <div class="filter-chips">
      <div class="chip active" onclick="setInvFilter('todos')" id="ifchip-todos">TODOS</div>
      <div class="chip" onclick="setInvFilter('disponible')" id="ifchip-disponible">✅ DISPONIBLE</div>
      <div class="chip" onclick="setInvFilter('bajo')" id="ifchip-bajo">⚠️ BAJO</div>
      <div class="chip" onclick="setInvFilter('agotado')" id="ifchip-agotado">❌ AGOTADO</div>
    </div>
    <div id="inv-kpis" style="margin-bottom:10px"></div>
    <div id="inv-list"></div>
    <div class="bottom-pad"></div>
  </div>

  <!-- CATALOGO -->
  <div class="screen" id="screen-catalogo">
    <div class="cat-search">
      <span style="color:var(--muted)">🔍</span>
      <input type="search" id="cat-search" placeholder="Buscar producto..." oninput="renderCatalogo()">
    </div>
    <div class="filter-chips" id="cat-brand-chips"></div>
    <div id="cat-list"></div>
    <div class="bottom-pad"></div>
  </div>

  <!-- CXC -->
  <div class="screen" id="screen-cxc">
    <div id="cxc-kpis" style="margin-bottom:10px"></div>
    <div id="cxc-list"></div>
    <div class="bottom-pad"></div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyC73pXz_txRknUZVvcDjjQuqCp7oaniWqk",
  authDomain:"farmers-app-70a3a.firebaseapp.com",
  projectId:"farmers-app-70a3a"
});
const db = getFirestore(app);

// ── Datos globales ──
window._db = db;
window._inv = {};
window._sales = [];
window._cxc = [];
window._msPedidos = [];
window._products = [];

const connDot = document.getElementById('conn-dot');

// ── Helpers ──
window.showToast = function(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.className = '', 2800);
};

window.sincronizar = async function() {
  document.getElementById('sync-btn').textContent = '↻ ...';
  try {
    await cargarTodo();
    showToast('✅ Datos actualizados', 'success');
  } catch(e) {
    showToast('❌ Error al sincronizar', 'error');
  }
  document.getElementById('sync-btn').textContent = '↻ SYNC';
};

// ── Cargar datos ──
async function cargarTodo() {
  connDot.className = '';
  document.getElementById('load-msg').textContent = 'Cargando inventario...';

  try {
    // Inventario
    const invDoc = await getDoc(doc(db,'data','inventory'));
    if(invDoc.exists()) {
      const arr = JSON.parse(invDoc.data().v || '[]');
      window._inv = {};
      arr.forEach(p => { window._inv[p.r] = p; window._products.push(p); });
    }

    // Ventas / MS Pedidos
    document.getElementById('load-msg').textContent = 'Cargando pedidos...';
    const salesDoc = await getDoc(doc(db,'data','sales'));
    if(salesDoc.exists()) {
      window._sales = JSON.parse(salesDoc.data().v || '[]');
    }

    // Extraer MS pedidos de sales
    const msRaw = localStorage.getItem('farmers_ms_pedidos');
    if(msRaw) {
      try { window._msPedidos = JSON.parse(msRaw); } catch(e){}
    }
    // También buscar en sales los pedidos MS
    if(window._sales.length && !window._msPedidos.length) {
      window._msPedidos = window._sales.filter(s => s.sucursales && s.sucursales.length);
    }

    // CXC
    document.getElementById('load-msg').textContent = 'Cargando CXC...';
    const cxcDoc = await getDoc(doc(db,'data','cxc'));
    if(cxcDoc.exists()) {
      const cxcData = JSON.parse(cxcDoc.data().v || '{}');
      window._cxc = cxcData.facturas || [];
    }

    connDot.className = 'ok';
  } catch(e) {
    connDot.className = 'err';
    throw e;
  }

  // Render todas las pantallas
  renderMonitor();
  renderInventario();
  renderCatalogo();
  renderCXC();

  // Ocultar loading
  document.getElementById('loading').style.display = 'none';
}

// ── MONITOR ──
window._monitorFilter = 'todos';
window.setMonitorFilter = function(f) {
  window._monitorFilter = f;
  document.querySelectorAll('[id^="fchip-"]').forEach(c => c.classList.remove('active'));
  document.getElementById('fchip-'+f)?.classList.add('active');
  renderMonitor();
};

window.renderMonitor = function() {
  const peds = window._msPedidos;
  const list = document.getElementById('monitor-list');
  const kpis = document.getElementById('monitor-kpis');

  if(!peds.length) {
    list.innerHTML = '<div class="empty"><div class="icon">📦</div><p>No hay pedidos activos</p></div>';
    kpis.innerHTML = '';
    return;
  }

  // KPIs
  let pendTotal=0, embalTotal=0, despTotal=0;
  peds.forEach(p => {
    const sucs = p.sucursales || [];
    const estados = p.sucursalesEstado || {};
    sucs.forEach(s => {
      const est = estados[s] || 'pendiente';
      if(est==='embalado') embalTotal++;
      else if(est==='despachado') despTotal++;
      else pendTotal++;
    });
  });

  kpis.innerHTML = `<div class="totales-bar">
    <div class="kpi"><div class="val">${peds.length}</div><div class="lbl">Pedidos</div></div>
    <div class="kpi"><div class="val" style="color:#fcd34d">${pendTotal}</div><div class="lbl">Pendientes</div></div>
    <div class="kpi"><div class="val" style="color:#6ee7b7">${embalTotal}</div><div class="lbl">Embalados</div></div>
    <div class="kpi"><div class="val" style="color:#93c5fd">${despTotal}</div><div class="lbl">Despachados</div></div>
  </div>`;

  // Filtrar
  const f = window._monitorFilter;
  const filtered = peds.filter(p => {
    if(f==='todos') return true;
    const estados = p.sucursalesEstado || {};
    const sucs = p.sucursales || [];
    return sucs.some(s => {
      const est = estados[s] || 'pendiente';
      return est === f;
    });
  });

  if(!filtered.length) {
    list.innerHTML = '<div class="empty"><div class="icon">🔍</div><p>Sin resultados</p></div>';
    return;
  }

  list.innerHTML = filtered.map(p => {
    const sucs = p.sucursales || [];
    const estados = p.sucursalesEstado || {};
    const numP = p.numPedido || p.num || '—';
    const fecha = p.fechaEmision || p.fecha || '—';

    const sucRows = sucs.map(s => {
      const est = estados[s] || 'pendiente';
      const esEmbalado = est === 'embalado';
      const esDespachado = est === 'despachado';
      return `<div class="suc-row">
        <div>
          <div class="suc-name">${s}</div>
          <span class="badge badge-${est==='embalado'?'green':est==='despachado'?'blue':'gray'} estado-${est}">${est.toUpperCase()}</span>
        </div>
        <div class="suc-actions">
          <button class="btn-estado btn-embalar ${esEmbalado||esDespachado?'active':''}"
            onclick="marcarEstado('${numP}','${s}','embalado',this)"
            ${esDespachado?'disabled':''}>📦 EMBALAR</button>
          <button class="btn-estado btn-despachar ${esDespachado?'active':''}"
            onclick="marcarEstado('${numP}','${s}','despachado',this)"
            ${!esEmbalado&&!esDespachado?'disabled':''}>🚚 DESPACHAR</button>
        </div>
      </div>`;
    }).join('');

    return `<div class="pedido-card" id="ped-${numP}">
      <div class="pedido-header" onclick="togglePedido('${numP}')">
        <div>
          <div class="pedido-num">📋 ${numP}</div>
          <div class="pedido-fecha">${fecha} · ${sucs.length} sucursal${sucs.length!==1?'es':''}</div>
        </div>
        <span style="color:var(--muted);font-size:1.2rem" id="arrow-${numP}">›</span>
      </div>
      <div class="pedido-body" id="body-${numP}">${sucRows}</div>
    </div>`;
  }).join('');
};

window.togglePedido = function(numP) {
  const body = document.getElementById('body-'+numP);
  const arrow = document.getElementById('arrow-'+numP);
  if(!body) return;
  const open = body.classList.toggle('open');
  if(arrow) arrow.style.transform = open ? 'rotate(90deg)' : '';
};

window.marcarEstado = async function(numP, suc, nuevoEstado, btn) {
  btn.disabled = true;
  btn.textContent = '...';

  // Actualizar en memoria
  const peds = window._msPedidos;
  const ped = peds.find(p => (p.numPedido||p.num) === numP);
  if(!ped) { btn.disabled = false; return; }

  if(!ped.sucursalesEstado) ped.sucursalesEstado = {};
  ped.sucursalesEstado[suc] = nuevoEstado;

  // Guardar en localStorage
  try {
    localStorage.setItem('farmers_ms_pedidos', JSON.stringify(peds));
  } catch(e){}

  // Guardar en Firebase sales
  try {
    const salesDoc = await getDoc(doc(window._db,'data','sales'));
    if(salesDoc.exists()) {
      let salesArr = JSON.parse(salesDoc.data().v || '[]');
      const idx = salesArr.findIndex(s => (s.numPedido||s.num) === numP);
      if(idx >= 0) {
        if(!salesArr[idx].sucursalesEstado) salesArr[idx].sucursalesEstado = {};
        salesArr[idx].sucursalesEstado[suc] = nuevoEstado;
        await setDoc(doc(window._db,'data','sales'), {v: JSON.stringify(salesArr)});
      }
    }
    showToast(`✅ ${suc}: ${nuevoEstado.toUpperCase()}`, 'success');
  } catch(e) {
    showToast('❌ Error al guardar', 'error');
  }

  renderMonitor();
};

// ── INVENTARIO ──
window._invFilter = 'todos';
window.setInvFilter = function(f) {
  window._invFilter = f;
  document.querySelectorAll('[id^="ifchip-"]').forEach(c => c.classList.remove('active'));
  document.getElementById('ifchip-'+f)?.classList.add('active');
  renderInventario();
};

window.renderInventario = function() {
  const q = (document.getElementById('inv-search')?.value||'').toLowerCase().trim();
  const f = window._invFilter;
  const prods = Object.values(window._inv);

  let filtered = prods.filter(p => {
    const ref = (p.r||'').toLowerCase();
    const desc = (p.d||'').toLowerCase();
    if(q && !ref.includes(q) && !desc.includes(q)) return false;
    const stock = parseInt(p.ex)||0;
    if(f==='disponible' && stock <= 10) return false;
    if(f==='bajo' && !(stock > 0 && stock <= 10)) return false;
    if(f==='agotado' && stock !== 0) return false;
    return true;
  }).sort((a,b) => (a.r||'').localeCompare(b.r||'',undefined,{numeric:true}));

  // KPIs
  const total = prods.length;
  const disp = prods.filter(p => (parseInt(p.ex)||0) > 10).length;
  const bajo = prods.filter(p => { const s=parseInt(p.ex)||0; return s>0&&s<=10; }).length;
  const agot = prods.filter(p => (parseInt(p.ex)||0) === 0).length;

  document.getElementById('inv-kpis').innerHTML = `<div class="totales-bar">
    <div class="kpi"><div class="val">${total}</div><div class="lbl">Total</div></div>
    <div class="kpi"><div class="val" style="color:#6ee7b7">${disp}</div><div class="lbl">Disponible</div></div>
    <div class="kpi"><div class="val" style="color:#fcd34d">${bajo}</div><div class="lbl">Bajo</div></div>
    <div class="kpi"><div class="val" style="color:#fca5a5">${agot}</div><div class="lbl">Agotado</div></div>
  </div>`;

  if(!filtered.length) {
    document.getElementById('inv-list').innerHTML = '<div class="empty"><div class="icon">🔍</div><p>Sin resultados</p></div>';
    return;
  }

  document.getElementById('inv-list').innerHTML = filtered.map(p => {
    const stock = parseInt(p.ex)||0;
    const cls = stock === 0 ? 'stock-out' : stock <= 10 ? 'stock-low' : 'stock-ok';
    return `<div class="inv-row">
      <div class="inv-ref">${p.r||''}</div>
      <div class="inv-desc">${p.d||''}</div>
      <div class="inv-stock ${cls}">${stock}</div>
    </div>`;
  }).join('');
};

// ── CATÁLOGO ──
window._catBrand = 'TODOS';
window.renderCatalogo = function() {
  const q = (document.getElementById('cat-search')?.value||'').toLowerCase().trim();
  const prods = Object.values(window._inv);

  // Marcas únicas
  const brands = ['TODOS',...[...new Set(prods.map(p => p.br||p.m||'').filter(Boolean))].sort()];
  const chipsEl = document.getElementById('cat-brand-chips');
  if(!chipsEl.children.length) {
    chipsEl.innerHTML = brands.map(b =>
      `<div class="chip ${b==='TODOS'?'active':''}" onclick="setCatBrand('${b}')" id="bchip-${b.replace(/\s/g,'_')}">${b}</div>`
    ).join('');
  }

  let filtered = prods.filter(p => {
    const ref = (p.r||'').toLowerCase();
    const desc = (p.d||'').toLowerCase();
    if(q && !ref.includes(q) && !desc.includes(q)) return false;
    if(window._catBrand !== 'TODOS' && (p.br||p.m||'') !== window._catBrand) return false;
    return true;
  }).sort((a,b) => (a.r||'').localeCompare(b.r||'',undefined,{numeric:true}));

  if(!filtered.length) {
    document.getElementById('cat-list').innerHTML = '<div class="empty"><div class="icon">🔍</div><p>Sin resultados</p></div>';
    return;
  }

  document.getElementById('cat-list').innerHTML = filtered.map(p => {
    const stock = parseInt(p.ex)||0;
    const stockBadge = stock===0?'badge-red':stock<=10?'badge-amber':'badge-green';
    const stockLabel = stock===0?'AGOTADO':stock<=10?`BAJO: ${stock}`:`${stock} uds`;
    const prices = [];
    if(p.u) prices.push(`<div class="cat-price">USD <span>$${parseFloat(p.u).toFixed(2)}</span></div>`);
    if(p.bv) prices.push(`<div class="cat-price">BCV <span>$${parseFloat(p.bv).toFixed(2)}</span></div>`);
    if(p.t) prices.push(`<div class="cat-price">TF <span>$${parseFloat(p.t).toFixed(2)}</span></div>`);
    return `<div class="cat-card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="cat-ref">${p.r||''} ${p.br||p.m?`<span style="color:var(--muted);font-weight:400">· ${p.br||p.m}</span>`:''}  </div>
          <div class="cat-desc">${p.d||''}</div>
        </div>
        <span class="badge ${stockBadge}">${stockLabel}</span>
      </div>
      ${prices.length?`<div class="cat-prices">${prices.join('')}</div>`:''}
    </div>`;
  }).join('');
};

window.setCatBrand = function(brand) {
  window._catBrand = brand;
  document.querySelectorAll('[id^="bchip-"]').forEach(c => c.classList.remove('active'));
  document.getElementById('bchip-'+brand.replace(/\s/g,'_'))?.classList.add('active');
  renderCatalogo();
};

// ── CXC ──
window.renderCXC = function() {
  const facs = window._cxc;
  const kpisEl = document.getElementById('cxc-kpis');
  const listEl = document.getElementById('cxc-list');

  if(!facs.length) {
    listEl.innerHTML = '<div class="empty"><div class="icon">💰</div><p>No hay facturas CXC</p></div>';
    kpisEl.innerHTML = '';
    return;
  }

  // Agrupar por cliente
  const clientes = {};
  facs.forEach(f => {
    const key = f.clienteId || f.cliente || 'DESCONOCIDO';
    if(!clientes[key]) clientes[key] = { nombre: f.cliente||f.clienteNombre||key, facturas: [], total: 0, pagado: 0 };
    clientes[key].facturas.push(f);
    clientes[key].total += parseFloat(f.total||f.monto||0);
    clientes[key].pagado += parseFloat(f.pagado||f.abonos||0);
  });

  const arr = Object.values(clientes).sort((a,b) => {
    const saldoA = a.total - a.pagado;
    const saldoB = b.total - b.pagado;
    return saldoB - saldoA;
  });

  let totalDeuda = 0, totalPagado = 0;
  arr.forEach(c => { totalDeuda += c.total; totalPagado += c.pagado; });
  const saldoPendiente = totalDeuda - totalPagado;

  kpisEl.innerHTML = `<div class="totales-bar">
    <div class="kpi"><div class="val">${arr.length}</div><div class="lbl">Clientes</div></div>
    <div class="kpi"><div class="val" style="color:#fca5a5">$${saldoPendiente.toFixed(0)}</div><div class="lbl">Por cobrar</div></div>
    <div class="kpi"><div class="val" style="color:#6ee7b7">$${totalPagado.toFixed(0)}</div><div class="lbl">Cobrado</div></div>
  </div>`;

  listEl.innerHTML = arr.map(c => {
    const saldo = c.total - c.pagado;
    const cls = saldo > 0 ? 'debe' : 'ok';
    return `<div class="cxc-row">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div class="cxc-client">${c.nombre}</div>
          <div class="cxc-meta">${c.facturas.length} factura${c.facturas.length!==1?'s':''} · Total $${c.total.toFixed(2)}</div>
        </div>
        <div class="cxc-saldo ${cls}">${saldo>0?'$'+saldo.toFixed(2):'✅'}</div>
      </div>
    </div>`;
  }).join('');
};

// ── NAVEGACIÓN ──
window.showScreen = function(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-'+name)?.classList.add('active');
  document.getElementById('tab-'+name)?.classList.add('active');
};
